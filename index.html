<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos da NFL - API Sports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .nfl-header {
            background: linear-gradient(135deg, #013369 0%, #d50a0a 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 20px;
        }
        .card-jogo {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card-jogo:hover { 
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .vs-badge {
            background-color: #e9ecef;
            color: #495057;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-placar {
            font-size: 1.1rem;
            padding: 6px 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="nfl-header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Temporada NFL 2025</h1>
            <p class="lead m-0">Acompanhe os resultados e calendários direto da API-Sports</p>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row mb-4 justify-content-center">
            <div class="col-md-6 col-lg-4 text-center">
                <label for="filtro-semana" class="form-label fw-bold text-secondary">Filtrar por Rodada:</label>
                <select id="filtro-semana" class="form-select text-center" disabled>
                    <option value="todos">Carregando rodadas...</option>
                </select>
            </div>
        </div>

        <div id="grid-jogos" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div id="loading" class="text-center w-100 py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Buscando partidas na API...</p>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "19b4c90311b79a967c00685c7bcdd288"; 
        const SEASON = "2025"; 
        let todasAsPartidas = []; // Guarda os dados globalmente para o filtro funcionar rápido

        async function buscarJogosNFL() {
            const url = `https://v1.american-football.api-sports.io/games?league=1&season=${SEASON}&key=${API_KEY}`;

            try {
                const resposta = await fetch(url, { method: "GET" });
                const dados = await resposta.json();

                if (dados.errors && Object.keys(dados.errors).length > 0) {
                    exibirErro(JSON.stringify(dados.errors));
                    return;
                }

                todasAsPartidas = dados.response; 
                
                if (!todasAsPartidas || todasAsPartidas.length === 0) {
                    document.getElementById('grid-jogos').innerHTML = `
                        <div class="text-center w-100 py-5">
                            <p class="text-warning fw-bold fs-5 m-0">Nenhum jogo encontrado para a temporada ${SEASON}.</p>
                        </div>
                    `;
                    return;
                }

                // Configura o filtro de semanas dinamicamente
                configurarFiltroSemanas(todasAsPartidas);
                
                // Exibe inicialmente a primeira rodada encontrada para não sobrecarregar a tela
                const primeiraSemana = todasAsPartidas[0]?.game.week || 'todos';
                document.getElementById('filtro-semana').value = primeiraSemana;
                
                renderizarJogos(primeiraSemana);

            } catch (erro) {
                exibirErro("Erro de conexão com o servidor da API.");
                console.error(erro);
            }
        }

        function renderizarJogos(semanaFiltrada) {
            const grid = document.getElementById('grid-jogos');
            grid.innerHTML = ''; 

            // Filtra o array se não for a opção "todos"
            const partidasExibidas = semanaFiltrada === 'todos' 
                ? todasAsPartidas 
                : todasAsPartidas.filter(p => p.game.week === semanaFiltrada);

            partidasExibidas.forEach(partida => {
                // Formata data tratando fuso horário para evitar problemas de "um dia a menos"
                const dataFormatada = new Date(partida.game.date).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
                const horaJogo = partida.game.time || '--:--';
                
                const jogoTerminou = partida.game.status.short === 'FT';
                const placarAway = partida.scores.away !== null ? partida.scores.away : '-';
                const placarHome = partida.scores.home !== null ? partida.scores.home : '-';
                
                // Define a cor do badge se o jogo acabou ou não
                const corBadgePlacar = jogoTerminou ? 'bg-primary' : 'bg-secondary text-wrap';

                grid.innerHTML += `
                    <div class="col">
                        <div class="card h-100 card-jogo">
                            <div class="card-header bg-white text-muted d-flex justify-content-between align-items-center py-3">
                                <span class="badge bg-dark px-2 py-1.5" style="font-size:0.75rem">${partida.game.week || 'NFL'}</span>
                                <small class="fw-bold text-dark">${dataFormatada} às ${horaJogo}</small>
                            </div>
                            <div class="card-body d-flex flex-column justify-content-center align-items-center py-4">
                                <div class="d-flex align-items-center justify-content-around w-100 mb-2">
                                    
                                    <div class="text-center flex-grow-1 px-2" style="max-width: 40%;">
                                        <img src="${partida.teams.away.logo}" class="img-fluid mb-2" style="max-height: 50px;" onerror="this.src='https://via.placeholder.com/50'">
                                        <p class="card-title fw-bold small text-truncate m-0" title="${partida.teams.away.name}">${partida.teams.away.name}</p>
                                        <span class="badge ${corBadgePlacar} badge-placar mt-2">${placarAway}</span>
                                    </div>

                                    <div class="mx-1 text-center">
                                        <span class="vs-badge">VS</span>
                                        <small class="d-block text-muted mt-2 fw-bold" style="font-size:0.7rem">${partida.game.status.short}</small>
                                    </div>

                                    <div class="text-center flex-grow-1 px-2" style="max-width: 40%;">
                                        <img src="${partida.teams.home.logo}" class="img-fluid mb-2" style="max-height: 50px;" onerror="this.src='https://via.placeholder.com/50'">
                                        <p class="card-title fw-bold small text-truncate m-0" title="${partida.teams.home.name}">${partida.teams.home.name}</p>
                                        <span class="badge ${corBadgePlacar} badge-placar mt-2">${placarHome}</span>
                                    </div>

                                </div>
                            </div>
                            <div class="card-footer bg-light text-center py-2">
                                <small class="text-muted text-truncate d-block" style="font-size: 0.75rem;">
                                    📍 ${partida.game.venue?.name || 'Estádio não definido'}
                                </small>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function configurarFiltroSemanas(partidas) {
            const select = document.getElementById('filtro-semana');
            
            // Extrai as semanas únicas presentes nos dados retornados
            const semanasUnicas = [...new Set(partidas.map(p => p.game.week))].filter(Boolean);
            
            select.innerHTML = '<option value="todos">Mostrar Todas as Rodadas</option>';
            semanasUnicas.forEach(semana => {
                select.innerHTML += `<option value="${semana}">${semana}</option>`;
            });

            select.disabled = false;

            // Escuta mudanças no select para filtrar na hora
            select.addEventListener('change', (e) => renderizarJogos(e.target.value));
        }

        function exibirErro(mensagem) {
            document.getElementById('grid-jogos').innerHTML = `
                <div class="text-center w-100 py-5">
                    <p class="text-danger fw-bold fs-5 m-0">Ocorreu um problema:</p>
                    <small class="text-muted">${mensagem}</small>
                </div>
            `;
        }

        buscarJogosNFL();
    </script>
</body>
</html>
